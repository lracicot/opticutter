name: Deploy to production

on:
  push:
    branches: [main]

env:
  AWS_REGION: us-east-1
  DOMAIN_NAME: louisracicot.com
  SUB_DOMAIN: opticutter
  ALT_SUB_DOMAIN: sheetmaxxing
  HOSTED_ZONE_ID: ${{ vars.HOSTED_ZONE_ID }}

permissions:
  id-token: write
  contents: read

jobs:
  Deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Git clone the repository
        uses: actions/checkout@v4
      - name: configure aws credentials
        uses: aws-actions/configure-aws-credentials@v5.1.0
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          role-session-name: GitHub_to_AWS_via_FederatedOIDC
          aws-region: ${{ env.AWS_REGION }}
      - name: Sts GetCallerIdentity
        run: aws sts get-caller-identity
      - name: deploy
        run: |
          aws cloudformation deploy \
            --template-file cloud/certificate.cfn.yaml \
            --region "$AWS_REGION" \
            --stack-name opticutter-static-website-certificate \
            --parameter-overrides \
              DomainName="$DOMAIN_NAME" \
              SubDomain="$SUB_DOMAIN" \
              AltSubDomain="$ALT_SUB_DOMAIN" \
              HostedZoneId="$HOSTED_ZONE_ID"

          CERT_ARN=$(aws cloudformation describe-stacks \
            --region "$AWS_REGION" \
            --stack-name opticutter-static-website-certificate \
            --query "Stacks[0].Outputs[?OutputKey=='CertificateArn'].OutputValue | [0]" \
            --output text)

          aws cloudformation deploy \
            --template-file cloud/stack.cfn.yaml \
            --region "$AWS_REGION" \
            --stack-name opticutter-static-website \
            --parameter-overrides \
              DomainName="$DOMAIN_NAME" \
              SubDomain="$SUB_DOMAIN" \
              AltSubDomain="$ALT_SUB_DOMAIN" \
              CertificateArn="$CERT_ARN" \
              HostedZoneId="$HOSTED_ZONE_ID"

          BUCKET_NAME=$(aws cloudformation describe-stack-resource \
            --region "$AWS_REGION" \
            --stack-name opticutter-static-website \
            --logical-resource-id RootBucket \
            --query StackResourceDetail.PhysicalResourceId \
            --output text)

          DISTR_ID=$(aws cloudformation describe-stack-resource \
            --region "$AWS_REGION" \
            --stack-name opticutter-static-website \
            --logical-resource-id CloudFrontDistribution \
            --query StackResourceDetail.PhysicalResourceId \
            --output text)

          aws s3 sync . "s3://$BUCKET_NAME" --exclude ".git*/*" --exclude "cloud/*" --delete
          aws cloudfront create-invalidation \
            --distribution-id "$DISTR_ID" \
            --paths "/*"
        shell: bash
